# Location: ~/.config/matugen/templates/foot.ini


[colors-dark]
alpha=0.67
foreground={{colors.on_surface.default.hex_stripped}}
background={{colors.surface.default.hex_stripped}}

## Normal/Regular Colors (0-7)
regular0={{colors.surface_container_highest.default.hex_stripped}} # black
regular1={{colors.error.default.hex_stripped}}                     # red
regular2={{colors.primary.default.hex_stripped}}                   # green
regular3={{colors.tertiary.default.hex_stripped}}                  # yellow
regular4={{colors.primary_container.default.hex_stripped}}         # blue
regular5={{colors.secondary.default.hex_stripped}}                 # magenta
regular6={{colors.secondary_container.default.hex_stripped}}       # cyan
regular7={{colors.surface_container_highest.default.hex_stripped}}                # white

## Bright Colors (8-15)
bright0={{colors.outline.default.hex_stripped}}                    # bright black
bright1={{colors.error_container.default.hex_stripped}}            # bright red
bright2={{colors.primary.default.hex_stripped}}                    # bright green
bright3={{colors.tertiary_container.default.hex_stripped}}         # bright yellow
bright4={{colors.inverse_primary.default.hex_stripped}}            # bright blue
bright5={{colors.secondary_container.default.hex_stripped}}        # bright magenta
bright6={{colors.outline_variant.default.hex_stripped}}            # bright cyan
bright7={{colors.inverse_on_surface.default.hex_stripped}}         # bright white

## Miscellaneous colors
selection-foreground={{colors.on_primary_container.default.hex_stripped}}
selection-background={{colors.primary_container.default.hex_stripped}}
urls={{colors.tertiary.default.hex_stripped}}
