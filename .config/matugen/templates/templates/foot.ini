# Location: ~/.config/matugen/templates/foot.ini


[main]
font= Departure Mono:style:size=11.5
pad = 30x30
[colors-dark]
alpha=0.4
background={{colors.surface.default.hex_stripped}}
foreground={{colors.on_surface.default.hex_stripped}}

regular0={{palettes.neutral._50.hex_stripped}}
regular1={{palettes.error._70.hex_stripped}}
regular2={{palettes.primary._70.hex_stripped}}
regular3={{palettes.tertiary._70.hex_stripped}}
regular4={{palettes.secondary._70.hex_stripped}}
regular5={{palettes.primary._60.hex_stripped}}
regular6={{palettes.tertiary._60.hex_stripped}}
regular7={{colors.on_surface.default.hex_stripped}}

bright0={{colors.outline.default.hex_stripped}}
bright1={{palettes.error._90.hex_stripped}}
bright2={{palettes.primary._90.hex_stripped}}
bright3={{palettes.tertiary._90.hex_stripped}}
bright4={{palettes.secondary._90.hex_stripped}}
bright5={{palettes.primary._95.hex_stripped}}
bright6={{palettes.tertiary._95.hex_stripped}}
bright7={{colors.surface_bright.default.hex_stripped}}
[key-bindings]
scrollback-up-page=Alt+Up
scrollback-down-page=Alt+Down
clipboard-copy=Alt+c
clipboard-paste=Alt+v
