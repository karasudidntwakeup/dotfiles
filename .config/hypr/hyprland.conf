# =============================================================================
# HYPRLAND CONFIGURATION FILE (CLEANED & MODERNIZED)
# =============================================================================

# 1. ENVIRONMENT VARIABLES (Nvidia & Session Fixes)
# -----------------------------------------------------------------------------
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __GL_SHADER_DISK_CACHE_PATH,/home/karasu/.config/niri/mac.icc

# 2. MONITORS & COLOR MANAGEMENT
# -----------------------------------------------------------------------------
monitor = eDP-1, preferred, auto, 1, icc, /home/karasu/Downloads/Profiles/Displays/Unknown Display-A36A995A-8F9E-6FEB-0E19-E116DCF621A5.icc
# Using extended block formatting to apply the absolute ICC profile path
# 3. CORE PROGRAMS & MAIN CONFIG VARIABLES
# -----------------------------------------------------------------------------
$terminal    = foot
$fileManager = yazi
$browser     = librewolf
$menu        = dmenu_run -b 
$mainMod     = SUPER 


# 4. AUTOSTART
# -----------------------------------------------------------------------------
exec-once = awww-daemon
exec-once = waybar
exec-once = pipewire & pipewire-pulse & wireplumber  


# 5. INPUT CONFIGURATION & DEVICE RULES
# -----------------------------------------------------------------------------
input {
    repeat_rate = 32
    repeat_delay = 200 
    kb_layout = us,ara
    kb_options = grp:ctrl_space_toggle,numpad:mac
    
    follow_mouse = 1
    sensitivity = 0 

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
    no_hardware_cursors = true
}


# 6. LOOK AND FEEL (Layouts & Borders)
# -----------------------------------------------------------------------------
general {
    gaps_in = 10
    gaps_out = 20
    border_size = 3
    
    # Dracula-inspired gradient borders
    col.active_border = rgb(44475a) rgb(bd93f9) 90deg
    col.inactive_border = rgba(44475aaa)

    allow_tearing = false
    layout = dwindle
}

dwindle {
    preserve_split = true 
}

master {
    new_status = master
}


# 7. DECORATIONS (Blur & Shadows)
# -----------------------------------------------------------------------------
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 7
        passes = 2
        ignore_opacity = true
        popups = true
        new_optimizations = true
        noise = 0.00
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.99
    }

    shadow {
        enabled = true
        range = 20
        render_power = 5
        color = rgba(000000b3)
    }
}


# 8. WINDOW GROUPS (Modern Setup)
# -----------------------------------------------------------------------------
group {
    col.border_active = rgb(bd93f9) rgb(44475a) 90deg
    col.border_inactive = rgba(282a36dd)

    groupbar {
        col.active = rgb(bd93f9) rgb(44475a) 90deg
        col.inactive = rgba(282a36dd)
    }
}


# 9. ANIMATIONS (Linear & Wind Curves)
# -----------------------------------------------------------------------------
animations {
    enabled = true

    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.01, 0.01, 0.01, 1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 6, wind
    animation = windowsIn, 1, 4, winIn
    animation = windowsOut, 1, 5, winOut
    animation = windowsMove, 1, 6, wind
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = workspaces, 1, 15, default, fade
}


# 10. MISCELLANEOUS SETTINGS
# -----------------------------------------------------------------------------
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}


# 11. KEYBINDINGS
# -----------------------------------------------------------------------------
# Core Execution & Management
bind = $mainMod, return, exec, $terminal
bind = $mainMod, X, killactive
bind = $mainMod SHIFT, Q, exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, C, exec, $browser
bind = $mainMod, Z, exec, qutebrowser
bind = $mainMod, Z, exec, waterfox
bind = $mainMod, R, exec, pkill hyprland && hyprctl dispatch exec hyprland
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, B, layoutmsg, togglesplit

# Focus Switching (Vim Keys: h, j, k, l)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Resizing Active Windows (Continuous Hold Enabled via 'binde')
binde = $mainMod, left, resizeactive, -10 0
binde = $mainMod, right, resizeactive, 10 0
binde = $mainMod, up, resizeactive, 0 -10
binde = $mainMod, down, resizeactive, 0 10

# Cycle Navigation Rules
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev

# Shifting Window Positions
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, j, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, k, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspace Workspace Nav (1 - 10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Displace Active Window to Target Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special Workspace (Scratchpad)
bind = $mainMod, S, exec, telegram-desktop

# Interactive Mouse Layout Manipulation
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio & Backlight Control (Continuous via 'bindel')
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, sudo brillo -q -A 5
bindel = , XF86MonBrightnessDown, exec, sudo brillo -q -U 5

# Media Player Actions (mpc Backend)
bindl = , XF86AudioNext, exec, mpc next
bindl = $mainMod, XF86AudioPause, exec, mpc pause
bindl = , XF86AudioPlay, exec, mpc play
bindl = , XF86AudioPrev, exec, mpc prev

# Screenshot Tooling & Lock Screen
bind = , PRINT, exec, hyprshot -m region -o ~/wallpaper/ScreenShot
bind = $mainMod, n, exec, hyprlock
