# ~/.config/mpv/mpv.conf

###############
# Video output
###############
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe
hwdec-codecs=h264,vp8,vp9,hevc,vc1        # exclude av1 if your GPU can't hw-decode it
profile=gpu-hq

###############
# Color management (ICC)
###############
icc-profile="~/.config/niri/mac.icc"
# icc-profile-auto=yes                    # use instead of the line above for auto-detection
icc-cache-dir="~/.config/mpv/icc-cache"
target-trc=auto
target-prim=auto

###############
# Scaling / quality
###############
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell
video-sync=display-resample
interpolation=yes
tscale=oversample

###############
# Streaming / yt-dlp
###############
ytdl-format=bestvideo[height<=1080][vcodec!*=av01]+bestaudio/best
ytdl-raw-options=cookies-from-browser=firefox   # remove/adjust if you don't want cookie passthrough
cache=yes
demuxer-max-bytes=500MiB
demuxer-max-back-bytes=200MiB

###############
# Subtitles
###############
slang=en,eng,enUS,en-US
sub-auto=fuzzy
sub-font-size=38
sub-color="#FFFFFF"
sub-border-size=2
sub-shadow-offset=1

###############
# Audio
###############
alang=en,eng,jpn,ja
volume=100
volume-max=150

###############
# OSD / UI
###############
osd-bar=yes
osd-font-size=32
osc=yes

###############
# Screenshots
###############
screenshot-format=png
screenshot-directory="~/Pictures/mpv-screenshots"
screenshot-template="%F-%p-%n"

###############
# Playback behavior
###############
save-position-on-quit=yes
keep-open=yes
window-minimized=no

###############
# Performance
###############
vd-lavc-dr=yes
